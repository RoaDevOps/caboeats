<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComeCabos</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">Come<span>Cabos</span></div>
</nav>

<section class="hero">
  <h1>La mejor comida de Cabos</h1>
  <p>Explora restaurantes locales con precios para residentes.</p>
</section>

<section class="restaurants">
<h2>Restaurantes</h2>

<div class="rest-grid">

<div class="rest-card">
<div class="card-thumb">🌮</div>
<div class="card-body">
<div class="card-name">La K‑Trina</div>
<div class="card-info">⭐ 4.8 · Mexicana · 30‑40 min</div>
<button class="view-btn">Ver menú</button>
</div>
</div>

<div class="rest-card">
<div class="card-thumb">🍣</div>
<div class="card-body">
<div class="card-name">Sushi Cabos</div>
<div class="card-info">⭐ 4.7 · Sushi · 35‑45 min</div>
<button class="view-btn">Ver menú</button>
</div>
</div>

<div class="rest-card">
<div class="card-thumb">🍔</div>
<div class="card-body">
<div class="card-name">Baja Burgers</div>
<div class="card-info">⭐ 4.9 · Hamburguesas · 25‑35 min</div>
<button class="view-btn">Ver menú</button>
</div>
</div>

</div>
</section>

<script src="js/app.js"></script>

</body>
</html>
